<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page not found — Subzillo</title>
<meta name="robots" content="noindex"/>
<meta name="theme-color" content="#07040F"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Geist', system-ui, sans-serif;
  background: #07040F;
  color: #F4F1FB;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
:root {
  --from: #A719DD;
  --to: #4489EB;
  --grad: linear-gradient(135deg, #A719DD 0%, #7C5BCC 50%, #4489EB 100%);
  --glow: rgba(167,25,221,0.35);
  --textDim: rgba(244,241,251,0.55);
  --border: rgba(255,255,255,0.10);
}
.noise {
  pointer-events: none;
  position: fixed; inset: 0; z-index: 999; opacity: 0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 200px 200px;
}
.orbs { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); }
.orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #A719DD, transparent 70%); top: -200px; left: -150px; opacity: 0.4; animation: drift1 18s ease-in-out infinite; }
.orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #4489EB, transparent 70%); bottom: -100px; right: -100px; opacity: 0.35; animation: drift2 22s ease-in-out infinite; }
@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
.card {
  position: relative; z-index: 1;
  text-align: center;
  padding: 56px 48px;
  max-width: 480px;
  border-radius: 24px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 96px;
  font-weight: 700;
  line-height: 1;
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 12px;
}
p {
  font-size: 15px;
  color: var(--textDim);
  line-height: 1.65;
  margin-bottom: 32px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 44px;
  padding: 0 24px;
  border-radius: 999px;
  background: var(--grad);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  text-decoration: none;
  box-shadow: 0 4px 20px var(--glow);
  transition: opacity 0.2s, transform 0.15s;
}
.btn:hover { opacity: 0.88; transform: translateY(-2px); }
.logo {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 16px; font-weight: 700;
  margin-bottom: 32px;
}
.logo-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--grad);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px var(--glow);
}
</style>
</head>
<body>
<div class="noise" aria-hidden="true"></div>
<div class="orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 3C9 3 6 5 6 8c0 2 1 3.5 3 4.5L12 14l3-1.5c2-1 3-2.5 3-4.5 0-3-3-5-6-5z" fill="white" opacity="0.9"/>
        <path d="M8 15l-2 4h12l-2-4" fill="white" opacity="0.5"/>
      </svg>
    </div>
    Subzillo
  </div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10"/></svg>
    Back to home
  </a>
</div>
</body>
</html>
