<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07040F"/>
      <stop offset="100%" stop-color="#0E0820"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A719DD"/>
      <stop offset="50%" stop-color="#7C5BCC"/>
      <stop offset="100%" stop-color="#4489EB"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#A719DD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A719DD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#4489EB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4489EB" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <circle cx="240" cy="190" r="320" fill="url(#orb1)" filter="url(#blur1)"/>
  <circle cx="960" cy="440" r="280" fill="url(#orb2)" filter="url(#blur1)"/>

  <!-- Logo icon -->
  <rect x="80" y="72" width="64" height="64" rx="18" fill="url(#grad)"/>
  <path d="M112 88C104 88 97 93 97 101c0 5 2.5 8.5 7 11L112 115l8-3c4.5-2.5 7-6 7-11 0-8-7-13-15-13z" fill="white" opacity="0.95"/>
  <path d="M103 115l-5 10h28l-5-10" fill="white" opacity="0.45"/>

  <!-- Logo wordmark -->
  <text x="160" y="117" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="36" fill="white" letter-spacing="-1">Subzillo</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-3">Your subscriptions,</text>
  <text x="80" y="350" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="72" letter-spacing="-3">
    <tspan fill="url(#grad)">finally</tspan>
    <tspan fill="white"> under control.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="420" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="28" fill="rgba(244,241,251,0.55)">The AI copilot that tracks, cancels and negotiates</text>
  <text x="80" y="458" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="28" fill="rgba(244,241,251,0.55)">subscriptions on your behalf.</text>

  <!-- CTA pill -->
  <rect x="80" y="510" width="260" height="54" rx="27" fill="url(#grad)"/>
  <text x="210" y="542" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="18" fill="white" text-anchor="middle">Join the waitlist →</text>

  <!-- Domain -->
  <text x="1120" y="570" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="20" fill="rgba(244,241,251,0.3)" text-anchor="end">subzillo.com</text>
</svg>
